name = "paiink-api"
main = "src/index.ts"
compatibility_date = "2026-05-15"
# nodejs_compat is intentionally omitted — this Worker uses Web APIs only
# (fetch, crypto.subtle, FormData, crypto.randomUUID).

# Custom Domain (api.paiink.com) is bound manually in the Cloudflare dashboard:
#   Workers & Pages -> paiink-api -> Settings -> Domains & Routes
#   -> Add Custom Domain: api.paiink.com
# Done as a Custom Domain (not a Route) because www.paiink.com is DNS-only
# (grey cloud) for CN reach. The api subdomain gets its own proxied DNS record.
# Phase A serves the same Worker on both api.paiink.com and (eventually)
# www.paiink.com once Pages is retired.

# Secrets (set via `wrangler secret put <NAME>` — never commit them):
#   GITHUB_TOKEN     — Anonymous-equivalent PAT used ONLY for skill repo
#                      public/commit verification. No write scopes; never
#                      touches paiink content (D1/R2 are our source of truth).
#   TURNSTILE_SECRET — Cloudflare Turnstile server-side secret. Pairs with
#                      TURNSTILE_SITE_KEY below. Set via
#                      `wrangler secret put TURNSTILE_SECRET` after
#                      provisioning a Turnstile widget in the dashboard.
#                      For local dev, drop the well-known CF test secret
#                      `1x0000000000000000000000000000000AA` (always-pass)
#                      into worker/.dev.vars. The Env type already declares
#                      `TURNSTILE_SECRET?: string` (Phase A reserved this).
#                      When the secret is unset, util/turnstile.ts logs a
#                      warning and lets requests through — fine for local
#                      dev, NOT what we want in production.
#
# Local dev: put both in worker/.dev.vars (gitignored).

# ---- bindings ----

# D1: canonical relational store (users, articles, likes, sessions,
# api_tokens, rate_limits). Created via `wrangler d1 create paiink`; copy
# the printed database_id into the field below.
[[d1_databases]]
binding = "DB"
database_name = "paiink"
database_id = "d6a813c2-41d0-4b07-983e-4031466e1161"
preview_database_id = "d6a813c2-41d0-4b07-983e-4031466e1161"  # share with prod under --remote dev
migrations_dir = "migrations"

# R2: article HTML + manifest + agreements + schema + export bundles.
# Bucket name must match the dashboard. Created via
# `wrangler r2 bucket create paiink-content`.
[[r2_buckets]]
binding = "R2_CONTENT"
bucket_name = "paiink-content"
preview_bucket_name = "paiink-content"  # share with prod under --remote dev

# KV: hot cache for top-likes ranking (Phase C onward). Phase A leaves
# the binding optional — runtime code must handle env.KV_CACHE === undefined.
# Created via `wrangler kv namespace create paiink-cache`.
[[kv_namespaces]]
binding = "KV_CACHE"
id = "33a03286eafb4d149d88ea85cd641b6d"
preview_id = "33a03286eafb4d149d88ea85cd641b6d"  # share with prod under --remote dev

# KV namespace for legacy IP rate limiting (3 submissions/IP/day). Fail-soft:
# if the namespace is somehow unreachable at runtime, the Worker lets
# the request through rather than 500-ing. Stack with Cloudflare WAF
# rate-limit rules for hard edge-level limits.
#
# Created via `npx wrangler kv namespace create paiink-rl` (one-time).
# Binding name MUST stay "KV_RATE_LIMIT" to match the code (Env interface).
# Kept around during the Phase A migration; D1 rate_limits is the
# canonical store going forward.
[[kv_namespaces]]
binding = "KV_RATE_LIMIT"
id = "b33d670c64324d3a8180c0d89563e1d4"
preview_id = "b33d670c64324d3a8180c0d89563e1d4"  # share with prod under --remote dev

# Workers Static Assets: CSS, fonts, cursor script, favicon.
#
# Source files live in worker/static/. The `[build] command` below runs
# `build-assets.mjs` first, which content-hashes each file and emits
# them into worker/static-dist/ as both `style.<hash>.css` (canonical,
# cache-busted) and `style.css` (transition fallback for stale HTML
# caches). The Worker imports `src/asset-manifest.ts` (also generated
# by the build) to look up the hashed paths.
#
# Deploys always serve the hashed names from `worker/static-dist/`.
[assets]
directory = "./static-dist"
binding = "ASSETS"

# Pre-build hook — runs before `wrangler dev` AND `wrangler deploy`.
# Regenerates content-hashed copies under worker/static-dist/.
[build]
command = "node build-assets.mjs"

[vars]
SITE_URL = "https://www.paiink.com"
# Cloudflare Turnstile public site key. Paired with the TURNSTILE_SECRET
# secret (set via `wrangler secret put`). For local dev, drop the
# well-known CF test site key `1x00000000000000000000AA` into worker/.dev.vars
# alongside the matching test secret (`1x0000000000000000000000000000000AA`).
TURNSTILE_SITE_KEY = "0x4AAAAAADQp-3SG8OcSm1AN"

# Workers free-tier limits: 100k req/day, 10ms CPU/req (we are I/O-bound
# on D1/R2 calls so we use mostly wall time, not CPU time).
